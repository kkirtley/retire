federal_tax:
  # Shared defaults are pinned to IRS tax year 2025 federal values.
  standard_deduction:
    mfj: 30000.00
    single: 15000.00
    additional_age65_mfj_per_person: 1600.00
    additional_age65_single: 2000.00

  brackets:
    mfj:
      - { rate: 0.10, up_to: 23850 }
      - { rate: 0.12, up_to: 96950 }
      - { rate: 0.22, up_to: 206700 }
      - { rate: 0.24, up_to: 394600 }
      - { rate: 0.32, up_to: 501050 }
      - { rate: 0.35, up_to: 751600 }
      - { rate: 0.37, up_to: null }

    single:
      - { rate: 0.10, up_to: 11925 }
      - { rate: 0.12, up_to: 48475 }
      - { rate: 0.22, up_to: 103350 }
      - { rate: 0.24, up_to: 197300 }
      - { rate: 0.32, up_to: 250525 }
      - { rate: 0.35, up_to: 626350 }
      - { rate: 0.37, up_to: null }

medicare:
  # Shared defaults are pinned to CMS calendar year 2025 Part B and IRMAA values.
  start_age: 65

  part_b:
    base_premium_monthly: 185.00

  part_d:
    # Actual Part D premiums vary by plan; this default uses the 2025 national base amount.
    base_premium_monthly: 36.78

  irmaa:
    lookback_years: 2
    reconsideration:
      enabled: false
      event: work_stoppage
      use_current_year_magi: true
      apply_after_retirement: true
      override_conversion_guardrails: false
    mfj:
      - { magi_up_to: 212000, part_b_add: 0.00, part_d_add: 0.00 }
      - { magi_up_to: 266000, part_b_add: 74.00, part_d_add: 13.70 }
      - { magi_up_to: 334000, part_b_add: 185.00, part_d_add: 35.30 }
      - { magi_up_to: 400000, part_b_add: 295.90, part_d_add: 57.00 }
      - { magi_up_to: 750000, part_b_add: 406.90, part_d_add: 78.60 }
      - { magi_up_to: null, part_b_add: 443.90, part_d_add: 85.80 }

    single:
      - { magi_up_to: 106000, part_b_add: 0.00, part_d_add: 0.00 }
      - { magi_up_to: 133000, part_b_add: 74.00, part_d_add: 13.70 }
      - { magi_up_to: 167000, part_b_add: 185.00, part_d_add: 35.30 }
      - { magi_up_to: 200000, part_b_add: 295.90, part_d_add: 57.00 }
      - { magi_up_to: 500000, part_b_add: 406.90, part_d_add: 78.60 }
      - { magi_up_to: null, part_b_add: 443.90, part_d_add: 85.80 }

taxes:
  conversion_tax_payment:
    treatment: "annual_cash_outflow_same_year"

historical_analysis:
  enabled: false
  dataset: damodaran_us_annual_1970_2025
  selected_start_year:
  success_rate_target: 0.90
  use_historical_inflation_for_expenses: true
  use_historical_inflation_for_income_cola: true
  weighting:
    method: equal
    modern_start_year: 1990
    modern_weight_multiplier: 2.0
  account_type_return_policies:
    traditional_ira:
      glide_path:
        - start_age: 0
          end_age: 64
          allocation: { stocks: 0.70, bonds: 0.25, cash: 0.05 }
        - start_age: 65
          end_age: 74
          allocation: { stocks: 0.60, bonds: 0.35, cash: 0.05 }
        - start_age: 75
          end_age: 120
          allocation: { stocks: 0.45, bonds: 0.45, cash: 0.10 }
    traditional_401k:
      glide_path:
        - start_age: 0
          end_age: 64
          allocation: { stocks: 0.70, bonds: 0.25, cash: 0.05 }
        - start_age: 65
          end_age: 74
          allocation: { stocks: 0.60, bonds: 0.35, cash: 0.05 }
        - start_age: 75
          end_age: 120
          allocation: { stocks: 0.45, bonds: 0.45, cash: 0.10 }
    roth_ira:
      glide_path:
        - start_age: 0
          end_age: 64
          allocation: { stocks: 0.85, bonds: 0.10, cash: 0.05 }
        - start_age: 65
          end_age: 74
          allocation: { stocks: 0.75, bonds: 0.20, cash: 0.05 }
        - start_age: 75
          end_age: 120
          allocation: { stocks: 0.60, bonds: 0.30, cash: 0.10 }
    roth_401k:
      glide_path:
        - start_age: 0
          end_age: 64
          allocation: { stocks: 0.85, bonds: 0.10, cash: 0.05 }
        - start_age: 65
