metadata:
  scenario_name: "Canonical Baseline"
  version: "1.0.2"
  description: "Curated deterministic annual baseline with supported retirement
    planning features and historical analysis disabled by default"
  created: "2026-04-20"
  currency: "USD"
  cadence: "annual"

simulation:
  start_date: "2026-07-01"
  retirement_date: "2033-01-01"
  end_condition:
    wife_age: 90
  proration:
    enabled: true
    method: "daily"

assumptions:
  inflation_rate: 0.025
  investment_return_default: 0.05
  success_age: 90
  ss_cola: 0.022
  va_cola: 0.025
  rmd_start_age: 75

validation:
  strict: true
  override_merge_rules:
    object_merge: "deep_merge"
    list_merge: "replace_unless_keyed"

household:
  filing_status_initial: "mfj"
  state_of_residence: "Missouri"

  husband:
    label: "Husband"
    birth_month: 7
    birth_year: 1967
    current_age: 58
    retirement_age: 65
    modeled_death:
      enabled: true
      death_year: 2037

  wife:
    label: "Wife"
    birth_month: 2
    birth_year: 1967
    current_age: 59
    retirement_age: 65
    modeled_death:
      enabled: false
      death_year: null

  expense_stepdown_after_husband_death:
    enabled: true
    surviving_expense_ratio: 0.70

income:
  earned_income:
    husband:
      enabled: true
      income_type: "w2"
      taxable: true
      annual_gross_salary_start: 195000.00
      annual_raise_rate: 0.02
      start_date: "2026-07-01"
      end_date: "2032-12-31"

    wife:
      enabled: true
      income_type: "1099"
      taxable: true
      annual_gross_salary_start: 60000.00
      annual_raise_rate: 0.02
      start_date: "2026-07-01"
      end_date: "2032-12-31"

  va_disability:
    owner: "Husband"
    amount_monthly: 4158.00
    taxable: false
    cola_rate: 0.025
    start_date: "2026-07-01"
    end_at_death: true

  va_survivor_benefit:
    owner: "Wife"
    enabled: true
    conditional_start:
      husband_death_after: "2035-02-01"
    amount_monthly: 1562.74
    taxable: false
    cola_rate: 0.025

  social_security:
    husband:
      claim_age: 70
      amount_monthly_at_claim: 5002.00
      cola_rate: 0.025

    wife:
      claim_age: 65
      amount_monthly_at_claim: 1500.00
      cola_rate: 0.025

    survivor_rule:
      enabled: true
      step_up_to_higher_benefit: true

  pension_income:
    wife_imrf:
      enabled: true
      owner: "Wife"
      amount_monthly: 302.90
      taxable: true
      cola_rate: 0.025
      start_date: "2026-07-01"

accounts:
  - name: "Husband Traditional IRA"
    type: "traditional_ira"
    owner: "Husband"
    starting_balance: 376000.00
    return_rate: 0.05
    return_schedule:
      - start_date: "2026-07-01"
        end_date: "2028-11-30"
        annual_rate: 0.0675
      - start_date: "2028-12-01"
        annual_rate: 0.05

  - name: "Husband Traditional 401k"
    type: "traditional_401k"
    owner: "Husband"
    starting_balance: 6000.00
    return_rate: 0.05

  - name: "Husband Roth IRA"
    type: "roth_ira"
    owner: "Husband"
    starting_balance: 310000.00
    return_rate: 0.07

  - name: "Husband Roth 401k"
    type: "roth_401k"
    owner: "Husband"
    starting_balance: 6000.00
    return_rate: 0.07

  - name: "Wife Traditional IRA"
    type: "traditional_ira"
    owner: "Wife"
    starting_balance: 10000.00
    return_rate: 0.05

  - name: "Wife Roth IRA"
    type: "roth_ira"
    owner: "Wife"
    starting_balance: 16000.00
    return_rate: 0.06

  - name: "Wife Traditional 401k"
    type: "traditional_401k"
    owner: "Wife"
    starting_balance: 15700.00
    return_rate: 0.05

  - name: "Household HSA"
    type: "hsa"
    owner: "Household"
    starting_balance: 5000.00
    return_rate: 0.04
    withdrawals_enabled: false
    contributions_enabled: true

  - name: "Car Fund"
    type: "restricted_cash"
    owner: "Household"
    starting_balance: 22000.00
    return_rate: 0.033
    withdrawals_enabled: false
    contributions_enabled: true
    restriction: "never_use_for_retirement_model_cashflows"

  - name: "Taxable Bridge Account"
    type: "taxable"
    owner: "Household"
    starting_balance: 0.00
    return_rate: 0.03
    target_balance_at_age_65: 250000.00
    target_balance_is_advisory: true
    withdrawals_enabled: true
    contributions_enabled: true

contributions:
  enabled: true
  surplus_allocation:
    enabled: true
    destination_account: "Taxable Bridge Account"
    start_age_husband: 70

  schedules:
    - name: "Husband Traditional 401k employee"
      enabled: true
      owner: "Husband"
      destination_account: "Husband Traditional 401k"
      type: "percent_of_salary"
      percent: 0.06
      start_date: "2026-07-01"
      end_date: "2032-12-31"

    - name: "Husband 401k employer"
      enabled: true
      owner: "Husband"
      destination_account: "Husband Traditional 401k"
      type: "percent_of_salary"
      percent: 0.04
      start_date: "2026-07-01"
      end_date: "2032-12-31"

    - name: "Wife Traditional 401k employee"
      enabled: false
      owner: "Wife"
      destination_account: "Wife Traditional 401k"
      type: "percent_of_salary"
      percent: 0.00
      start_date: "2026-07-01"
      end_date: "2032-12-31"

    - name: "Household HSA contribution"
      enabled: true
      owner: "Household"
      destination_account: "Household HSA"
      type: "fixed_monthly"
      amount_monthly: 400.00
      start_date: "2026-07-01"
      end_date: "2032-12-31"

    - name: "Car fund savings"
      enabled: true
      owner: "Household"
      destination_account: "Car Fund"
      type: "fixed_annual"
      amount_annual: 10800.00
      start_date: "2026-07-01"
      end_date: "2032-12-31"

    - name: "Taxable bridge funding"
      enabled: true
      owner: "Household"
      destination_account: "Taxable Bridge Account"
      type: "fixed_monthly"
      amount_monthly: 4000.00
      start_date: "2026-07-01"
      end_date: "2032-12-31"
      purpose: "conversion_tax_funding"

expenses:
  base_living:
    amount_annual: 70000.00
    inflation_rate: 0.025
    adjustments:
      - start_year: 2037
        end_year: 2057
        amount_annual: 90000.00

  travel:
    amount_annual: 0.00
    inflation_rate: 0.025

  housing:
    property_tax:
      amount_annual: 7000.00
      start_date: "2026-07-01"
      inflation_rate: 0.02

    homeowners_insurance:
      amount_annual: 2500.00
      start_date: "2026-07-01"
      inflation_rate: 0.02

spending_guardrails:
  enabled: true
  base_spending_annual: 70000.00
  floor_spending_annual: 60000.00
  trigger:
    type: "resource_pressure"

mortgage:
  enabled: true
  starting_balance: 225000.00
  interest_rate: 0.06
  remaining_term_years: 15
  scheduled_payment_monthly:
  payment_frequency: "monthly"

  payoff_by_age:
    enabled: true
    target_age: 65
    target_date: "2032-12-31"
    method: "compute_extra_principal"

state_tax:
  model: "effective_rate"
  taxable_income_basis: "federal_taxable_income"
  effective_rate: 0.04

medicare:
  irmaa:
    reconsideration:
      enabled: true
      event: "work_stoppage"
      use_current_year_magi: true
      apply_after_retirement: true
      override_conversion_guardrails: false

strategy:
  roth_conversions:
    enabled: true
    strategy: "adaptive_ladder"

    base_policy:
      active_ages: [ 65, 66, 67, 68, 69, 70 ]
      base_conversion_amounts:
        65: 140000.00
        66: 130000.00
        67: 115000.00
        68: 100000.00
        69: 100000.00
        70: 50000.00

    tax_constraints:
      max_marginal_bracket: 0.22
      allow_partial_bracket_fill: true

    irmaa_controls:
      enabled: true
      max_tier: 2
      reduce_if_exceeded: true

    market_adjustments:
      enabled: true
      signal_account_type: "traditional_ira"
      rules: []
      bands:
        - upper_return: -0.15
          multiplier: 1.30
        - lower_return: -0.15
          upper_return: 0.00
          multiplier: 1.15
        - lower_return: 0.00
          upper_return: 0.12
          multiplier: 0.95
        - lower_return: 0.12
          multiplier: 0.80

    balance_targets:
      enabled: true
      traditional_ira_target_at_70: 150000.00
      acceptable_band_percent: 0.33
      target_priority: "higher_than_min_conversion"
      allow_below_min_if_needed_to_hit_target: true
      adjustment_logic:
        if_above_target:
          action: "increase"
          adjustment_percent: 0.25
        if_below_target:
          action: "decrease"
          adjustment_percent: 0.20

    social_security_interaction:
      reduce_after_husband_claim: true
      reduction_percent: 0.75

    safety_limits:
      max_conversion: 150000.00
      min_conversion:
        type: "floor_with_tax_guard"
        base: 50000.00
        reduce_if_exceeds_bracket: true
        enforce_only_when_target_not_at_risk: true

    tax_payment:
      enabled: true
      payment_timing: "same_year"
      estimated_tax_method: "incremental"
      source_order:
        - "taxable_bridge_account"
        - "taxable"
        - "traditional_distribution"
      source_account_name: "Taxable Bridge Account"
      allow_roth_for_conversion_taxes: false
      gross_up_conversion_if_needed: false
      track_conversion_tax_separately: true
      allow_bridge_for_living_expenses: true
      prioritize_tax_use_first: true
      use_bridge_for_living_only_if_absolutely_necessary: true

  charitable_giving:
    enabled: true
    policy:
      type: "greater_of"
      percent_of_income: 0.10
      compare_to: "rmd"
      income_definition: "recurring_sources_only"
      recurring_sources:
        - "va_disability"
        - "social_security"
        - "pension_income"

    qcd:
      enabled: true
      start_age: 70.5
      annual_limit: 100000.00
      allow_above_rmd: true
      applies_to:
        - "traditional_ira"
      tax_treatment:
        reduces_rmd: true
        excluded_from_taxable_income: true
      depletion_target:
        enabled: true
        owners: [ "Husband" ]
        target_age: 90
        target_balance: 0.00
        method: "level_annual_qcd"

    coordination_rules:
      apply_qcd_before_rmd_taxation: true
      if_ira_insufficient_for_giving: "skip_excess_giving"
      prohibit_other_accounts_for_giving: true

  withdrawals:
    order:
      - "taxable_bridge_account"
      - "traditional_ira"
      - "traditional_401k"
      - "roth_ira"
      - "roth_401k"

    restrictions:
      never_use_accounts:
        - "Car Fund"

    bridge_usage:
      pre_age_70:
        primary_use: "conversion_taxes"
        secondary_use: "living_expenses_if_necessary"
      post_age_70:
        use_as: "growth_and_liquidity"

    rmd_handling:
      enforce: true
      allow_qcd_to_satisfy_rmd: true
      withdraw_remaining_rmd_if_needed: true

  account_rollovers:
    enabled: true
    roll_traditional_401k_to_ira: true
    roll_roth_401k_to_ira: true

overrides: {}
